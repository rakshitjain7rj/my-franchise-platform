# =============================================================================
# my-franchise-platform — full local/production-style stack
#   db         -> PostgreSQL 16   (persistent, health-gated)
#   redis      -> Redis 7         (cache / events, health-gated)
#   backend    -> Medusa v2 API   (runs migrations, then starts on :9000)
#   storefront -> Next.js         (standalone server on :3000)
#
# Usage (laptop only):
#   docker compose --env-file .env.docker up --build
#
# Usage (laptop + phone on same Wi‑Fi — recommended):
#   ./scripts/docker-up.sh
#   # or:  npm run docker:up
#   Phone → http://<your-lan-ip>:3000
#   Admin → http://<your-lan-ip>:9000/app
#
# Ports bind 0.0.0.0 so LAN devices can connect. NEXT_PUBLIC_MEDUSA_BACKEND_URL
# and CORS in .env.docker must use the LAN IP (not localhost) for mobile API calls.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      # Bind all interfaces so phones on the same Wi‑Fi can reach the API/admin.
      - "0.0.0.0:9000:9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    # node:20-slim has no wget/curl, but Node has global fetch — use that.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ---------------------------------------------------------------------------
  storefront:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at build time; sourced from .env.docker.
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_DEFAULT_FRANCHISE_ID: ${NEXT_PUBLIC_DEFAULT_FRANCHISE_ID}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      # Bind all interfaces so phones on the same Wi‑Fi can open the storefront.
      - "0.0.0.0:3000:3000"
    environment:
      # Server-side only (container network). Browser uses NEXT_PUBLIC_* from build.
      - MEDUSA_BACKEND_URL=http://backend:9000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
